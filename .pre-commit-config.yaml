default_language_version:
    python: python3.12

exclude: ^(.semgrep|vendored)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^templates/templated_email/compiled/
        exclude_types: [svg,graphql]
      - id: end-of-file-fixer
        exclude: ^templates/templated_email/compiled/
        exclude_types: [svg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [--cache-dir=/dev/null]
        exclude: (tests|vendored)/

  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: uv run deptry .
        language: system
        pass_filenames: false

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.153.0
    hooks:
    - id: semgrep
      exclude_types:
        - yaml
      args:
        - scan
        - --config
        - .semgrep/
        # Do not try to scan '.semgrep/' directories as they contain test files
        # thus they will trigger findings.
        - --exclude=.semgrep/
        # Set the exit code to non-zero if there are findings.
        - --error
        # Do not check for version updates, it slows down the execution.
        - --disable-version-check
        # Quiet mode in order to not pollute the pre-commit outputs.
        # Replace --quiet with --verbose to debug issues.
        - --quiet

  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.8.14
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: migrations-check
        language: system
        name: Check for uncreated migrations.
        entry: sh -c "uv run ./manage.py makemigrations --check --dry-run"
        files: "models\\.py$"
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: gql-schema-check
        language: system
        name: Check GraphQL schema is up to date.
        entry: sh -c "uv run ./manage.py get_graphql_schema | diff saleor/graphql/schema.graphql -"
        stages: [pre-commit]
